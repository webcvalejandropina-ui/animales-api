name: alex-alimales-api

services:
  alex-alimales-api:
    image: alex-alimales-api
    build: .
    container_name: alex-alimales-api
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/webcvalejandropina-ui/animales-api/main/logo.png"
    ports:
      - "13008:13008"
    environment:
      ANIMALES_DB_PATH: /app/animales.db
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:13008/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
