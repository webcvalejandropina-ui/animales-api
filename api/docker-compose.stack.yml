name: animales-api

services:
  animales-api:
    platform: linux/amd64
    image: animales-api:latest
    pull_policy: never
    container_name: animales-api
    ports:
      - "13008:13008"
    environment:
      ANIMALES_DB_PATH: /app/animales.db
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:13008/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
